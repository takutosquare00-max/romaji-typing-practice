<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#000000">
  <title>タイピングで覚える日本語の読み</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      font-size: 16px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      padding-bottom: max(env(safe-area-inset-bottom), 12px);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 8px 16px 12px;
      max-height: 50vh;
      max-height: 50dvh;
      overflow-y: auto;
    }

    header {
      text-align: center;
      padding: 8px 0 12px;
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
    }
    header h1 ruby { ruby-position: over; ruby-align: center; }
    header h1 rt { font-size: 0.5em; line-height: 1; }
    header .subtitle {
      font-size: 0.75rem;
      color: #8e8e93;
      margin-top: 2px;
      font-weight: 400;
    }

    .card {
      background: #000;
      border-radius: 10px;
      padding: 12px 16px 16px;
      margin-bottom: 8px;
    }

    .sentence-display {
      font-size: 1.15rem;
      line-height: 1.5;
      min-height: 2.8em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px 8px;
      color: #fff;
      width: 100%;
      box-sizing: border-box;
      font-weight: 400;
    }
    .sentence-display .sentence-inner {
      max-width: 100%;
      text-align: center;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    @media (min-width: 480px) and (min-height: 600px) {
      .sentence-display { font-size: 1.375rem; min-height: 3.5em; padding: 12px; }
    }

    .romaji-display {
      margin-top: 8px;
      padding: 12px 14px;
      background: #1c1c1e;
      border-radius: 8px;
      border: none;
      font-family: "SF Mono", "Menlo", "Monaco", "Consolas", monospace;
      font-size: 0.9375rem;
      line-height: 1.7;
      min-height: 2.5em;
      text-align: center;
      letter-spacing: 0.03em;
    }
    @media (min-width: 480px) and (min-height: 600px) {
      .romaji-display { font-size: 1rem; padding: 14px 16px; }
    }
    .romaji-display .char {
      display: inline;
    }
    .romaji-display .char.correct {
      color: #30d158;
    }
    .romaji-display .char.wrong {
      color: #ff453a;
    }
    .romaji-display .char.current {
      color: #1c1c1e;
    }
    .romaji-display .char.remaining {
      color: #1c1c1e;
    }
    .romaji-display .char.space {
      display: inline;
    }
    .romaji-wrapper {
      position: relative;
      margin-top: 8px;
      cursor: text;
      touch-action: manipulation;
      -webkit-tap-highlight-color: rgba(255,255,255,0.1);
    }
    .romaji-wrapper .romaji-display {
      margin-top: 0;
    }
    .typing-input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      min-height: 48px;
      opacity: 0;
      cursor: text;
      font-size: 16px;
      -webkit-appearance: none;
      appearance: none;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }
    .btn {
      flex: 1;
      min-height: 44px;
      padding: 0 20px;
      font-size: 1rem;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }
    .btn:active {
      opacity: 0.7;
    }
    .btn-primary {
      background: #0a84ff;
      color: #fff;
    }
    .btn-secondary {
      background: #2c2c2e;
      color: #fff;
    }
    .btn-secondary:active {
      background: #3a3a3c;
    }

    .mode-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .mode-toggle-options {
      display: flex;
      gap: 16px;
    }
    .stats-inline {
      font-size: 0.875rem;
      color: #8e8e93;
      font-variant-numeric: tabular-nums;
    }
    .stats-inline ruby { ruby-position: over; ruby-align: center; }
    .stats-inline rt { font-size: 0.5em; line-height: 1; }
    .mode-toggle label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
      color: #8e8e93;
      cursor: pointer;
    }
    .mode-toggle input {
      width: 18px;
      height: 18px;
      accent-color: #0a84ff;
    }

    .sentence-display ruby {
      ruby-position: over;
      ruby-align: center;
    }
    .sentence-display rt {
      font-size: 0.5em;
      line-height: 1;
      user-select: none;
    }

    .feedback {
      margin-top: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.875rem;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.correct {
      background: rgba(48, 209, 88, 0.15);
      color: #30d158;
    }
    .feedback.wrong {
      background: rgba(255, 69, 58, 0.12);
      color: #ff453a;
    }
    .feedback .expected {
      font-family: "SF Mono", Menlo, monospace;
      margin-top: 6px;
      font-size: 0.875rem;
      opacity: 0.9;
    }

    .result-panel {
      text-align: center;
      padding: 20px 16px;
      display: none;
    }
    .result-panel.show { display: block; }
    .result-panel h2 {
      font-size: 1.15rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }
    .result-panel p {
      font-size: 0.875rem;
      color: #8e8e93;
      margin: 0;
    }
    .result-score {
      font-size: 2rem;
      font-weight: 600;
      margin: 10px 0;
      letter-spacing: -0.02em;
    }
    .result-score.good { color: #30d158; }
    .result-score.fair { color: #ffd60a; }
    .result-score.poor { color: #ff453a; }

    @media (min-width: 480px) and (min-height: 600px) {
      .container {
        padding: 16px 20px 20px;
        max-height: 55vh;
        max-height: 55dvh;
      }
      header { padding: 16px 0 20px; }
      header h1 { font-size: 1.25rem; }
      header .subtitle { font-size: 0.8125rem; margin-top: 4px; }
      .card { padding: 16px 20px 20px; margin-bottom: 12px; }
      .mode-toggle { margin-bottom: 16px; }
      .btn-row { margin-top: 20px; }
      .btn { min-height: 48px; }
      .feedback { margin-top: 12px; padding: 12px 16px; }
      .result-panel { padding: 32px 24px; }
      .result-panel h2 { font-size: 1.25rem; margin-bottom: 24px; }
      .result-score { font-size: 2.5rem; margin: 16px 0; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>タイピングで<ruby>覚<rt>おぼ</rt></ruby>える<ruby>日本語<rt>にほんご</rt></ruby>の<ruby>読<rt>よ</rt></ruby>み</h1>
      <p class="subtitle">Learn Japanese readings through typing</p>
    </header>

    <div class="card" id="practiceCard">
      <div class="mode-toggle">
        <div class="mode-toggle-options">
          <label><input type="radio" name="furiganaMode" value="on" checked> ふりがなあり</label>
          <label><input type="radio" name="furiganaMode" value="off"> ふりがななし</label>
        </div>
        <span class="stats-inline"><ruby>正解<rt>せいかい</rt></ruby>: <span id="correctCount">0</span>/<span id="totalCount">0</span></span>
      </div>

      <div class="sentence-display" id="sentenceDisplay">
        （読み込み中…）
      </div>

      <div class="romaji-wrapper">
        <div class="romaji-display" id="romajiDisplay" tabindex="0" contenteditable="false"
          role="application" aria-label="ローマ字入力エリア" lang="en">
          （ここをクリックして入力開始）
        </div>
        <input type="text" id="typingInput" class="typing-input" tabindex="0" autocomplete="off" autocapitalize="off"
          autocorrect="off" spellcheck="false" inputmode="latin" lang="en"
          aria-label="ローマ字入力">
      </div>

      <div class="feedback" id="feedback"></div>

      <div class="btn-row">
        <button type="button" class="btn btn-secondary" id="btnSkip">スキップ</button>
      </div>
    </div>

    <div class="result-panel" id="resultPanel">
      <h2>おつかれさまでした！</h2>
      <p>正解数</p>
      <div class="result-score" id="resultScore">0</div>
      <p>問 / <span id="resultTotal">0</span> 問</p>
      <div class="btn-row" style="margin-top: 24px;">
        <button type="button" class="btn btn-primary" id="btnRestart">もう一度</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      'use strict';
      var FALLBACK_DATA = [
        {ja:"私は 毎朝7時に 起きます", romaji:"watashi wa maiasa 7 ji ni okimasu", furigana:"<ruby>私<rt>わたし</rt></ruby>は <ruby>毎朝<rt>まいあさ</rt></ruby>7<ruby>時に<rt>ときに</rt></ruby> <ruby>起き<rt>おき</rt></ruby>ます"},
        {ja:"学校に 行きます", romaji:"gakkou ni ikimasu", furigana:"<ruby>学校<rt>がっこう</rt></ruby>に <ruby>行き<rt>いき</rt></ruby>ます"},
        {ja:"本を 読みます", romaji:"hon o yomimasu", furigana:"<ruby>本<rt>ほん</rt></ruby>を <ruby>読み<rt>よみ</rt></ruby>ます"}
      ];

      var sentences = [];
      var filtered = [];
      var currentIndex = 0;
      var correctCount = 0;
      var answeredCount = 0;

      var display = document.getElementById('sentenceDisplay');
      var romajiDisplay = document.getElementById('romajiDisplay');
      var typingInput = document.getElementById('typingInput');
      var feedback = document.getElementById('feedback');
      var practiceCard = document.getElementById('practiceCard');
      var resultPanel = document.getElementById('resultPanel');
      var correctCountEl = document.getElementById('correctCount');
      var totalCountEl = document.getElementById('totalCount');

      if (!display || !romajiDisplay || !typingInput || !practiceCard || !resultPanel) {
        if (display) display.textContent = 'ページの読み込みに失敗しました。';
        return;
      }

      function isFuriganaOn() {
        var r = document.querySelector('input[name="furiganaMode"]:checked');
        return r && r.value === 'on';
      }

      function normalizeRomaji(s) {
        return String(s || '').toLowerCase().replace(/\s+/g, ' ').replace(/[ー－\-]/g, '-').trim();
      }
      function toPronunciationForm(s) {
        return s
          .replace(/([iueon\s])ha/g, '$1wa')
          .replace(/wo/g, 'o')
          .replace(/\bhe\b/g, 'e');
      }
      function toKunreiStyle(s) {
        return String(s)
          .replace(/sha/g, 'sya').replace(/shu/g, 'syu').replace(/sho/g, 'syo').replace(/shi/g, 'si')
          .replace(/cha/g, 'tya').replace(/chu/g, 'tyu').replace(/cho/g, 'tyo').replace(/chi/g, 'ti')
          .replace(/tsu/g, 'tu').replace(/fu/g, 'hu')
          .replace(/ja/g, 'zya').replace(/ju/g, 'zyu').replace(/jo/g, 'zyo').replace(/ji/g, 'zi');
      }
      function stripPeriod(s) {
        return String(s || '').replace(/[.。]/g, '').trim();
      }
      function normalizeLongVowel(s) {
        return String(s)
          .replace(/([aeiou])-\1/g, '$1$1')
          .replace(/([aeiou]) \1/g, '$1$1')
          .replace(/([aeiou])-/g, '$1$1')
          .replace(/([aeiou]) +$/g, '$1$1');
      }
      function digitsToReadings(s) {
        var t = String(s);
        t = t.replace(/11ji/g, 'juuichiji').replace(/12ji/g, 'juuniji').replace(/10ji/g, 'juuji')
          .replace(/17\s*ji/g, 'juushichiji').replace(/18ji/g, 'juuhachiji').replace(/19ji/g, 'juukyuuji')
          .replace(/13ji/g, 'juusanji').replace(/14ji/g, 'juuyoji').replace(/15ji/g, 'juugoji')
          .replace(/16ji/g, 'juurokuji')
          .replace(/7\s*ji/g, 'shichiji').replace(/8ji/g, 'hachiji').replace(/9ji/g, 'kuji')
          .replace(/1ji/g, 'ichiji').replace(/2ji/g, 'niji').replace(/3ji/g, 'sanji')
          .replace(/4ji/g, 'yoji').replace(/5ji/g, 'goji').replace(/6ji/g, 'rokuji');
        t = t.replace(/2kai/g, 'nikai');
        t = t.replace(/14\s*nin/g, 'juuyonin').replace(/24\s*nin/g, 'nijuuyonin')
          .replace(/1\s*nin/g, 'hitori').replace(/2\s*nin/g, 'futari').replace(/4\s*nin/g, 'yonin')
          .replace(/yonnin/g, 'yonin');
        t = t.replace(/(^|\s)11(\s|$)/g, '$1juuichi$2').replace(/(^|\s)12(\s|$)/g, '$1juuni$2')
          .replace(/(^|\s)10(\s|$)/g, '$1juu$2').replace(/(^|\s)17(\s|$)/g, '$1juushichi$2')
          .replace(/(^|\s)18(\s|$)/g, '$1juuhachi$2').replace(/(^|\s)19(\s|$)/g, '$1juukyuu$2')
          .replace(/(^|\s)13(\s|$)/g, '$1juusan$2').replace(/(^|\s)14(\s|$)/g, '$1juuyon$2')
          .replace(/(^|\s)15(\s|$)/g, '$1juugo$2').replace(/(^|\s)16(\s|$)/g, '$1juuroku$2');
        t = t.replace(/(^|\s)7(\s|$)/g, '$1shichi$2').replace(/(^|\s)8(\s|$)/g, '$1hachi$2')
          .replace(/(^|\s)9(\s|$)/g, '$1kyuu$2').replace(/(^|\s)1(\s|$)/g, '$1ichi$2')
          .replace(/(^|\s)2(\s|$)/g, '$1ni$2').replace(/(^|\s)3(\s|$)/g, '$1san$2')
          .replace(/(^|\s)4(\s|$)/g, '$1yon$2').replace(/(^|\s)5(\s|$)/g, '$1go$2')
          .replace(/(^|\s)6(\s|$)/g, '$1roku$2');
        return t;
      }
      function normalizeN(s) {
        return s.replace(/n{2,}(?=[^aeiou]|$)/g, 'n');
      }
      function normalizeBase(s) {
        var r = stripPeriod(s);
        var base = normalizeRomaji(r);
        base = normalizeLongVowel(base);
        base = digitsToReadings(base);
        base = toPronunciationForm(base);
        base = normalizeN(base);
        return toKunreiStyle(base);
      }
      function normalizeForDisplay(s) {
        var r = stripPeriod(s);
        var base = normalizeRomaji(r);
        base = normalizeLongVowel(base);
        base = digitsToReadings(base);
        base = normalizeN(base);
        return toKunreiStyle(base);
      }
      function normalizeForCompare(s) {
        return normalizeForDisplay(s).replace(/\s/g, '');
      }
      function prepareSentence(s) {
        s.ja = String(s.ja || '').replace(/。/g, '').trim();
        if (s.furigana) s.furigana = s.furigana.replace(/。/g, '');
        var r = stripPeriod(s.romaji || '');
        var normalized = normalizeForDisplay(r).replace(/\s/g, '');
        s._display = normalized;
        s._norm = normalized;
        return s;
      }

      function loadSentences() {
        var data = FALLBACK_DATA;
        try {
          var el = document.getElementById('sentences-json');
          if (el && el.textContent) {
            var parsed = JSON.parse(el.textContent);
            if (Array.isArray(parsed) && parsed.length > 0) data = parsed;
          }
        } catch (e) {}
        sentences = data.map(prepareSentence);
        filterAndShuffle();
      }

      function filterAndShuffle() {
        filtered = sentences.slice();
        for (var i = filtered.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = filtered[i]; filtered[i] = filtered[j]; filtered[j] = t;
        }
        currentIndex = 0;
        correctCount = 0;
        answeredCount = 0;
        updateStats();
      }

      function getCurrent() { return filtered[currentIndex]; }

      function escapeHtml(s) {
        var div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
      }

      function buildRomajiSpans(displayStr) {
        var html = '';
        for (var i = 0; i < displayStr.length; i++) {
          var c = displayStr[i];
          var cls = 'char';
          if (c === ' ') cls += ' space';
          else cls += ' remaining';
          html += '<span class="' + cls + '" data-idx="' + i + '">' + escapeHtml(c) + '</span>';
        }
        return html;
      }

      function updateRomajiDisplay() {
        var s = getCurrent();
        if (!s || !s._display) return;
        var userTyped = normalizeForCompare(typingInput.value);
        var expected = s._norm;
        var displayStr = s._display;

        var expectedPos = 0;
        for (var ui = 0; ui < userTyped.length; ui++) {
          var uc = userTyped[ui];
          if (expectedPos < expected.length && uc === expected[expectedPos]) {
            expectedPos++;
          }
        }

        var html = '';
        var normIdx = 0;
        for (var i = 0; i < displayStr.length; i++) {
          var c = displayStr[i];
          if (c === ' ') {
            html += '<span class="char space"> </span>';
            continue;
          }
          var cls = 'char';
          if (normIdx < expectedPos) cls += ' correct';
          else if (normIdx === expectedPos) cls += ' current';
          else cls += ' remaining';
          html += '<span class="' + cls + '">' + escapeHtml(c) + '</span>';
          normIdx++;
        }
        romajiDisplay.innerHTML = html;
      }

      function showCurrent() {
        if (filtered.length === 0) {
          display.innerHTML = '<span class="sentence-inner">問題がありません。</span>';
          romajiDisplay.innerHTML = '';
          return;
        }
        var s = getCurrent();
        if (!s) { showResult(); return; }
        if (isFuriganaOn() && s.furigana) {
          display.innerHTML = '<span class="sentence-inner">' + s.furigana + '</span>';
        } else {
          display.innerHTML = '<span class="sentence-inner">' + escapeHtml(s.ja) + '</span>';
        }
        romajiDisplay.innerHTML = buildRomajiSpans(s._display);
        typingInput.value = '';
        feedback.className = 'feedback';
        feedback.textContent = '';
        updateRomajiDisplay();
        try { typingInput.focus(); } catch (e) {}
      }

      function updateStats() {
        if (correctCountEl) correctCountEl.textContent = correctCount;
        if (totalCountEl) totalCountEl.textContent = answeredCount;
      }

      function showResult() {
        practiceCard.style.display = 'none';
        resultPanel.classList.add('show');
        var total = filtered.length;
        var totalEl = document.getElementById('resultTotal');
        var scoreEl = document.getElementById('resultScore');
        if (totalEl) totalEl.textContent = total;
        if (scoreEl) {
          scoreEl.textContent = correctCount;
          scoreEl.className = 'result-score ' + (correctCount === total ? 'good' : correctCount >= total * 0.7 ? 'fair' : 'poor');
        }
      }

      var advancing = false;
      function onTypingInput() {
        var s = getCurrent();
        if (!s || advancing) return;
        var userTyped = normalizeForCompare(typingInput.value);
        var expected = s._norm;
        var displayLen = (s._display || '').length;
        var expectedPos = 0;
        for (var ui = 0; ui < userTyped.length; ui++) {
          var uc = userTyped[ui];
          if (expectedPos < expected.length && uc === expected[expectedPos]) {
            expectedPos++;
          }
        }

        if (userTyped === expected) {
          advancing = true;
          answeredCount++;
          correctCount++;
          feedback.className = 'feedback show correct';
          feedback.textContent = '✓ 正解！';
          updateStats();
          updateRomajiDisplay();
          setTimeout(function() {
            advancing = false;
            currentIndex++;
            (currentIndex >= filtered.length) ? showResult() : showCurrent();
          }, 500);
          return;
        }

        if (expectedPos >= expected.length) {
          advancing = true;
          answeredCount++;
          feedback.className = 'feedback show correct';
          feedback.textContent = '次の問題へ';
          updateStats();
          updateRomajiDisplay();
          setTimeout(function() {
            advancing = false;
            currentIndex++;
            (currentIndex >= filtered.length) ? showResult() : showCurrent();
          }, 500);
          return;
        }

        updateRomajiDisplay();
      }

      function skip() {
        var s = getCurrent();
        if (!s) return;
        answeredCount++;
        feedback.className = 'feedback show wrong';
        feedback.innerHTML = '正解: <span class="expected">' + escapeHtml(s._display) + '</span>';
        updateStats();
        setTimeout(function() {
          currentIndex++;
          (currentIndex >= filtered.length) ? showResult() : showCurrent();
        }, 800);
      }

      document.querySelector('.romaji-wrapper').addEventListener('click', function() {
        typingInput.focus();
      });
      typingInput.addEventListener('input', onTypingInput);
      typingInput.addEventListener('compositionend', onTypingInput);
      typingInput.addEventListener('paste', function(e) { e.preventDefault(); });
      typingInput.addEventListener('keydown', function(e) {
        if (e.code === 'Enter') {
          e.preventDefault();
          skip();
        }
      });
      document.getElementById('btnSkip').addEventListener('click', skip);
      document.getElementById('btnRestart').addEventListener('click', function() {
        resultPanel.classList.remove('show');
        practiceCard.style.display = 'block';
        filterAndShuffle();
        showCurrent();
      });

      var modeRadios = document.querySelectorAll('input[name="furiganaMode"]');
      for (var i = 0; i < modeRadios.length; i++) {
        modeRadios[i].addEventListener('change', function() { showCurrent(); });
      }

      loadSentences();
      if (filtered.length) showCurrent();
    })();
  </script>
</body>
</html>
